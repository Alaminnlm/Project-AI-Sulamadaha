<style>
:root {
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.3);
    --bg-base: #020617;
    --sidebar-bg: rgba(10, 18, 40, 0.97);
    --glass-bg: rgba(15, 23, 42, 0.7);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; }

body {
    background-color: var(--bg-base);
    background-image: linear-gradient(rgba(2,6,23,0.6), rgba(2,6,23,0.85)),
        url("{{ url_for('static', filename='background/Pantai-Sulamadaha.jpg') }}");
    background-size: cover; background-position: center; background-attachment: fixed;
    color: var(--text-main); min-height: 100vh;
}

/* ===== LAYOUT ===== */
.admin-wrapper { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
.admin-sidebar {
    width: 240px; background: var(--sidebar-bg);
    border-right: 1px solid var(--glass-border);
    padding: 24px 16px; display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    flex-shrink: 0; overflow-y: auto;
}

.sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.1rem; font-weight: 800; padding: 8px 12px; margin-bottom: 24px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.sidebar-brand i { -webkit-text-fill-color: var(--accent); }

.sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-spacer { flex: 1; min-height: 20px; }

.sidebar-menu a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px; color: var(--text-muted);
    text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: all 0.2s;
    border: 1px solid transparent;
}
.sidebar-menu a:hover, .sidebar-menu a.active {
    background: rgba(56,189,248,0.1); color: var(--accent);
    border-color: rgba(56,189,248,0.2);
}
.sidebar-menu a.active { font-weight: 700; }
.logout-link { color: #f87171 !important; }
.logout-link:hover { background: rgba(248,113,113,0.1) !important; border-color: rgba(248,113,113,0.25) !important; color: #f87171 !important; }

/* ===== MAIN ===== */
.admin-main { flex: 1; padding: 32px; overflow-y: auto; min-width: 0; }

.page-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.page-title {
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.page-sub { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }

/* ===== GLASS CARDS ===== */
.glass-card {
    background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border); border-radius: 20px;
    padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); margin-bottom: 20px;
}
.section-title {
    font-size: 1rem; font-weight: 700; color: var(--text-main);
    display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
    padding-bottom: 14px; border-bottom: 1px solid var(--glass-border);
}
.section-title i { color: var(--accent); }

/* ===== ALERTS ===== */
.alert {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-radius: 10px; font-size: 0.88rem; font-weight: 500; margin-bottom: 16px;
}
.alert-error { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }
.alert-success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #10b981; }

/* ===== TABLE ===== */
.table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--glass-border); }
.dark-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.dark-table thead th {
    background: rgba(255,255,255,0.04); padding: 12px 16px; text-align: left;
    font-weight: 700; color: var(--text-muted); font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.04em;
    border-bottom: 1px solid var(--glass-border);
}
.dark-table tbody td { padding: 12px 16px; color: var(--text-main); border-bottom: 1px solid rgba(255,255,255,0.04); }
.dark-table tbody tr:hover { background: rgba(255,255,255,0.03); }
.dark-table tbody tr:last-child td { border-bottom: none; }
.mono { font-family: 'Courier New', monospace; font-size: 0.8rem; color: var(--text-muted); }
.ts { font-size: 0.8rem; color: var(--text-muted); }

/* ===== BADGES & STATUS ===== */
.badge-action { display: inline-flex; align-items: center; gap: 4px; background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.25); padding: 3px 10px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
.badge-google { display: inline-flex; align-items: center; gap: 4px; background: rgba(56,189,248,0.1); color: #38bdf8; border: 1px solid rgba(56,189,248,0.2); padding: 3px 10px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
.badge-email { display: inline-flex; align-items: center; gap: 4px; background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); padding: 3px 10px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
.badge-active { display: inline-flex; align-items: center; gap: 4px; background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); padding: 3px 10px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
.badge-inactive { display: inline-flex; align-items: center; gap: 4px; background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); padding: 3px 10px; border-radius: 50px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
.status-200 { display: inline-flex; align-items: center; background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); padding: 2px 8px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
.status-400 { display: inline-flex; align-items: center; background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.3); padding: 2px 8px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
.status-401, .status-500 { display: inline-flex; align-items: center; background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); padding: 2px 8px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }

/* ===== TABLE LINK ===== */
.table-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.88rem; }
.table-link:hover { text-decoration: underline; }
.btn-detail { background: rgba(56,189,248,0.1); color: var(--accent); border: 1px solid rgba(56,189,248,0.25); padding: 4px 12px; border-radius: 7px; text-decoration: none; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
.btn-detail:hover { background: rgba(56,189,248,0.2); }

/* ===== PAGINATION ===== */
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
.pagination a, .pagination span { padding: 7px 12px; border: 1px solid var(--glass-border); border-radius: 8px; text-decoration: none; color: var(--text-muted); font-size: 0.85rem; transition: all 0.2s; }
.pagination a:hover { background: rgba(56,189,248,0.1); color: var(--accent); border-color: rgba(56,189,248,0.25); }
.pagination .current { background: rgba(56,189,248,0.2); color: var(--accent); border-color: rgba(56,189,248,0.4); font-weight: 700; }

/* ===== FORM CONTROLS ===== */
.search-form { display: flex; gap: 10px; margin-bottom: 16px; }
.search-form input, .filter-form select {
    background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 10px 16px; color: var(--text-main);
    font-size: 0.9rem; font-family: inherit; flex: 1; transition: all 0.2s;
    -webkit-appearance: none; appearance: none;
}
.filter-form select option { background: #0f172a; color: var(--text-main); }
.search-form input::placeholder { color: var(--text-muted); }
.search-form input:focus, .filter-form select:focus { outline: none; border-color: rgba(56,189,248,0.5); background: rgba(56,189,248,0.05); }
.search-form button {
    background: linear-gradient(135deg, var(--accent), #0ea5e9); color: var(--bg-base);
    border: none; padding: 10px 20px; border-radius: 10px;
    font-weight: 700; font-size: 0.88rem; cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.search-form button:hover { transform: translateY(-1px); }

/* ===== ACCENT BUTTON ===== */
.btn-accent {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    color: var(--bg-base); text-decoration: none; padding: 10px 20px;
    border-radius: 10px; font-size: 0.88rem; font-weight: 700;
    transition: all 0.2s; box-shadow: 0 0 16px var(--accent-glow); white-space: nowrap;
    border: none; cursor: pointer; font-family: inherit;
}
.btn-accent:hover { transform: translateY(-2px); box-shadow: 0 0 24px var(--accent-glow); }

/* ===== EMPTY STATE ===== */
.empty-cell { text-align: center; color: var(--text-muted); padding: 40px !important; }

/* ===== FORM FIELDS ===== */
.form-section { display: flex; flex-direction: column; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-group label { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); }
.form-group input, .form-group select, .form-group textarea {
    background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 11px 16px; color: var(--text-main);
    font-size: 0.92rem; font-family: inherit; transition: all 0.2s;
}
.form-group input::placeholder, .form-group textarea::placeholder { color: var(--text-muted); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: rgba(56,189,248,0.5); background: rgba(56,189,248,0.05);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
}
.btn-save {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--accent), #0ea5e9); color: var(--bg-base);
    border: none; padding: 12px 28px; border-radius: 10px;
    font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 16px var(--accent-glow); align-self: flex-start;
}
.btn-save:hover { transform: translateY(-2px); box-shadow: 0 0 24px var(--accent-glow); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .admin-wrapper { flex-direction: column; }
    .admin-sidebar { width: 100%; height: auto; position: relative; }
    .sidebar-spacer { display: none; }
    .sidebar-menu { flex-direction: row; flex-wrap: wrap; }
    .admin-main { padding: 16px; }
    .page-header { flex-direction: column; align-items: flex-start; }
}
</style>
