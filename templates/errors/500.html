<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #f87171;
            --accent-glow: rgba(248, 113, 113, 0.4);
            --bg-base: #020617;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-base);
            background-image:
                linear-gradient(rgba(2, 6, 23, 0.6), rgba(2, 6, 23, 0.85)),
                url("{{ url_for('static', filename='background/Pantai-Sulamadaha.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            padding: 2rem;
        }

        .error-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            animation: fadeUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 12px var(--accent-glow));
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.75rem;
        }

        .error-desc {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #ef4444);
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--accent-glow);
        }
    </style>
</head>

<body>
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-triangle-exclamation"></i>
        </div>
        <div class="error-code">500</div>
        <div class="error-title">Server Sedang Bermasalah</div>
        <p class="error-desc">Terjadi kesalahan internal pada server. Tim kami sedang menanganinya. Silakan coba lagi beberapa saat kemudian.</p>
        <a href="{{ url_for('index') }}" class="btn-home">
            <i class="fas fa-rotate-right"></i> Coba Lagi
        </a>
    </div>
</body>

</html>
